name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: '*'
  release:
    types: [published]

env:
  PIP_DISABLE_PIP_VERSION_CHECK: 1

defaults:
  run:
    shell: bash -l {0}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Conda environment with Micromamba
      uses: mamba-org/setup-micromamba@main
      with:
        environment-file: test-environment.yml
        channels: conda-forge

    - name: Install the package
      run: pip install . -vvv

    - name: Test installation files
      run: |
        test -d $CONDA_PREFIX/share/jupyter/nbextensions/bqplot
        test -f $CONDA_PREFIX/share/jupyter/nbextensions/bqplot/extension.js
        test -f $CONDA_PREFIX/share/jupyter/nbextensions/bqplot/index.js
        test -d $CONDA_PREFIX/share/jupyter/labextensions/bqplot
        test -f $CONDA_PREFIX/share/jupyter/labextensions/bqplot/package.json
        test -d $CONDA_PREFIX/share/jupyter/labextensions/bqplot/static

    - name: Debug labextension
      run: jupyter labextension list

    - name: Validate the labextension
      run: jupyter labextension list 2>&1 | grep bqplot

    - name: Discover typos with codespell
      run: codespell --ignore-words-list="afterall,curvelinear,hist" --skip="./share,./.git/*,./js/node_modules/*,./js/dist/*,*.csv,*.json,*.lock,*.map,docs/*"

    - name: Python PEP8 check
      run: flake8 bqplot --ignore=E501,W504,W503

    - name: JavaScript prettyfier
      run: |
        jlpm install
        jlpm run prettier --check .
      working-directory: js

    - name: Python tests
      run: pytest tests examples/Marks

    - name: JavaScript tests
      run: jlpm run test
      working-directory: js

    - name: Build Python package
      run: |
        python setup.py sdist bdist_wheel
        cd dist
        sha256sum * | tee SHA256SUMS

    - name: Twine check
      run: |
        pip install --upgrade twine
        twine check dist/*.whl dist/*.tar.gz

    - name: Pack JavaScript package
      run: |
        jlpm pack -o bqplot.tgz
        mv bqplot.tgz ../dist
      working-directory: js

    - name: Upload builds
      uses: actions/upload-artifact@v4
      with:
        name: dist ${{ github.run_number }}
        path: ./dist

  visual-regression-tests:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@main
        with:
          environment-name:  bqplot-test
          environment-file: test-environment.yml
          python-version: 3.9
          auto-activate-base: false
          channels: conda-forge

      - uses: actions/download-artifact@v4
        with:
          name: dist ${{ github.run_number }}
          path: ./dist

      - name: Install the package
        run: pip install -vv bqplot*.whl
        working-directory: dist

      - name: Install dependencies
        shell: bash -l {0}
        working-directory: ui-tests
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: jlpm install

      - name: Install browser
        shell: bash -l {0}
        run: npx playwright install chromium
        working-directory: ui-tests

      - name: Execute integration tests
        shell: bash -l {0}
        working-directory: ui-tests
        run: jlpm run test

      - name: Upload Playwright Test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bqplot-playwright-tests
          path: |
            ui-tests/test-results
            ui-tests/playwright-report

  install:
    runs-on: ${{ matrix.os }}-latest
    needs: [build]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        dist: ['bqplot*.tar.gz', 'bqplot*.whl']

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@main
        with:
          environment-file: test-environment.yml
          channels: conda-forge

      - uses: actions/download-artifact@v4
        with:
          name: dist ${{ github.run_number }}
          path: ./dist

      - name: Install the package
        run: |
          cd dist
          pip install -vv ${{ matrix.dist }}

      - name: Test installation files
        run: |
          test -d $CONDA_PREFIX/share/jupyter/nbextensions/bqplot
          test -f $CONDA_PREFIX/share/jupyter/nbextensions/bqplot/extension.js
          test -f $CONDA_PREFIX/share/jupyter/nbextensions/bqplot/index.js
          test -d $CONDA_PREFIX/share/jupyter/labextensions/bqplot
          test -f $CONDA_PREFIX/share/jupyter/labextensions/bqplot/package.json
          test -d $CONDA_PREFIX/share/jupyter/labextensions/bqplot/static

      - name: Validate the labextension
        run: jupyter labextension list 2>&1 | grep bqplot

  publish-pypi:
    runs-on: ubuntu-24.04
    needs: [build, visual-regression-tests]
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'release' && 'release-pypi' || '' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist ${{ github.run_number }}
          path: ./dist

      - name: Keep only PyPI artifacts
        run: |
          rm -f dist/*.tgz dist/SHA256SUMS
          ls -la dist/

      - name: Verify tag matches wheel version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          WHEEL_VERSION=$(ls dist/bqplot-*.whl | sed -E 's|.*/bqplot-([^-]+)-.*\.whl|\1|')
          echo "Release tag:    $TAG"
          echo "Wheel version:  $WHEEL_VERSION"
          if [ "$TAG" != "$WHEEL_VERSION" ]; then
            echo "::error::Release tag '$TAG' does not match wheel version '$WHEEL_VERSION'"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Twine check
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI (Trusted Publisher)
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    runs-on: ubuntu-24.04
    needs: [build, visual-regression-tests]
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ github.event_name == 'release' && 'release-npm' || '' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist ${{ github.run_number }}
          path: ./dist

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports trusted publishing
        run: npm install -g npm@latest

      - name: Show npm package version
        run: |
          NPM_VERSION=$(ls dist/bqplot-*.tgz | sed -E 's|.*/bqplot-(.+)\.tgz|\1|')
          echo "Will publish bqplot@$NPM_VERSION"
          echo "NPM_VERSION=$NPM_VERSION" >> "$GITHUB_ENV"

      - name: Check npm version
        id: npm_check
        run: |
          if npm view "bqplot@$NPM_VERSION" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "bqplot@$NPM_VERSION is already on npm"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "bqplot@$NPM_VERSION not yet on npm"
          fi

      - name: Fail if releasing an already-published version
        if: github.event_name == 'release' && steps.npm_check.outputs.already_published == 'true'
        run: |
          echo "::error::bqplot@$NPM_VERSION is already on npm; bump js/package.json before releasing"
          exit 1

      - name: npm publish (dry-run)
        if: github.event_name != 'release' && steps.npm_check.outputs.already_published == 'false'
        run: npm publish ./dist/bqplot-*.tgz --access public --dry-run

      - name: Skip dry-run (version already published)
        if: github.event_name != 'release' && steps.npm_check.outputs.already_published == 'true'
        run: echo "::notice::bqplot@$NPM_VERSION is already on npm; skipping dry-run. Bump js/package.json on a release-prep PR to exercise the full publish flow."

      - name: npm publish (Trusted Publisher)
        if: github.event_name == 'release'
        run: npm publish ./dist/bqplot-*.tgz --access public --provenance
